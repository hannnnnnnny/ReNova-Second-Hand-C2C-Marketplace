spring:
  application:
    name: renova-backend
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:novacart}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    default-property-inclusion: non_null

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

novacart:
  security:
    jwt-secret: ${JWT_SECRET}
    jwt-expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}
    cookie-secure: ${SESSION_COOKIE_SECURE:false}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  orders:
    reservation-minutes: ${ORDER_RESERVATION_MINUTES:30}
    expiration-scan-ms: ${ORDER_EXPIRATION_SCAN_MS:60000}
  media:
    internal-endpoint: ${OBJECT_STORAGE_INTERNAL_ENDPOINT}
    upload-endpoint: ${OBJECT_STORAGE_UPLOAD_ENDPOINT:${OBJECT_STORAGE_INTERNAL_ENDPOINT}}
    access-key: ${OBJECT_STORAGE_ACCESS_KEY}
    secret-key: ${OBJECT_STORAGE_SECRET_KEY}
    bucket: ${OBJECT_STORAGE_BUCKET:renova-media}
    public-api-base-url: ${PUBLIC_API_BASE_URL:http://localhost:8080/api}
    max-upload-bytes: ${MEDIA_MAX_UPLOAD_BYTES:10485760}
    max-pixels: ${MEDIA_MAX_PIXELS:20000000}
    upload-expiry-minutes: ${MEDIA_UPLOAD_EXPIRY_MINUTES:15}
    unattached-expiry-hours: ${MEDIA_UNATTACHED_EXPIRY_HOURS:24}
    download-expiry-minutes: ${MEDIA_DOWNLOAD_EXPIRY_MINUTES:5}
