spring:
  datasource:
    url: jdbc:h2:mem:novacart_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

novacart:
  security:
    jwt-secret: test-secret-value-with-enough-length-for-local-tests
    jwt-expiration-minutes: 120
    cookie-secure: false
  cors:
    allowed-origins: http://localhost:5173,http://127.0.0.1:5173
  orders:
    reservation-minutes: 30
    expiration-scan-ms: 3600000
  media:
    internal-endpoint: http://127.0.0.1:19000
    upload-endpoint: http://127.0.0.1:19000
    access-key: test-access-key
    secret-key: test-secret-key
    bucket: renova-test-media
    public-api-base-url: http://localhost:8080/api
    max-upload-bytes: 10485760
    max-pixels: 20000000
    upload-expiry-minutes: 15
    unattached-expiry-hours: 24
    download-expiry-minutes: 5
