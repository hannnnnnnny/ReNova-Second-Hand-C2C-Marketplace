spring:
  application:
    name: renova-backend
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:novacart}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    default-property-inclusion: non_null
  servlet:
    multipart:
      enabled: true
      # Per-file cap. The upload service enforces this again at the byte level
      # so a misconfigured proxy can never accept a larger file.
      max-file-size: 5MB
      max-request-size: 50MB

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

# JWT_SECRET, DB_USERNAME and DB_PASSWORD have NO defaults on purpose.
# JwtSecretGuard refuses to start outside dev/test/demo profiles unless
# JWT_SECRET is a real, 32+ byte, non-placeholder value.
novacart:
  security:
    jwt-secret: ${JWT_SECRET}
    jwt-expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  uploads:
    # Directory the upload service writes to. Must be writable by the
    # JVM user. Outside dev/test/demo this should be a persistent volume.
    dir: ${RENOVA_UPLOAD_DIR:./uploads}
    max-file-bytes: ${RENOVA_UPLOAD_MAX_BYTES:5242880}      # 5 MB
    max-files-per-request: ${RENOVA_UPLOAD_MAX_FILES:8}
    # URL path the static handler exposes the files under. The frontend
    # treats the returned URLs as opaque so this is safe to change.
    public-path: ${RENOVA_UPLOAD_PUBLIC_PATH:/uploads}
